name: release

# Build cross-platform binaries and publish a GitHub Release whenever a
# version tag (e.g. v1.2.3) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Functional tests
        run: scripts/functional-test.sh

  release:
    needs: test # do not publish unless tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build release artifacts
        run: scripts/build-release.sh "${GITHUB_REF_NAME}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
